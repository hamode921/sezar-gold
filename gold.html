<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLD HUNTER V1.2 | سيزار</title>
    <style>
        :root { --gold: #fcc419; --bg: #030303; --neon: #00f2ff; --danger: #ff4d4d; }
        body { background: var(--bg); color: #eee; font-family: sans-serif; padding: 10px; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .header-box { border: 2px solid var(--gold); background: #000; width: 95%; max-width: 480px; padding: 15px; border-radius: 15px; text-align: center; margin-bottom: 15px; box-shadow: 0 0 15px rgba(252,196,25,0.2); }
        .price-tag { font-size: 42px; color: var(--neon); font-weight: 800; margin: 10px 0; text-shadow: 0 0 10px var(--neon); }
        .whale-tracker { background: #0a0a0a; width: 95%; max-width: 480px; border-radius: 15px; border: 1px solid #1a1a1a; padding: 20px; box-sizing: border-box; text-align: center; }
        #terminal { width: 95%; max-width: 480px; height: 100px; background: #000; border: 1px solid #222; margin-top: 15px; padding: 10px; font-size: 11px; color: #555; overflow-y: auto; border-radius: 8px; text-align: left; }
    </style>
</head>
<body onload="initRadar()">

    <div class="header-box">
        <h3 style="margin:0; color:var(--gold);">🔱 GOLD HUNTER V1.2 🔱</h3>
        <div class="price-tag" id="main-price">0.00</div>
        <div id="market-status" style="font-size: 14px; font-weight: bold; color: #555;">جاري كسر الحجب...</div>
    </div>

    <div class="whale-tracker">
        <div id="whale-output" style="font-size: 18px; color: var(--gold);">🔱 سيزار، انتظر نبض الذهب...</div>
    </div>

    <div id="terminal"></div>

    <script>
        async function initRadar() {
            logMsg("تم تفعيل الجسر الدولي.. جاري سحب الـ 4730.");
            fetchGoldData();
            setInterval(fetchGoldData, 3000); // تحديث كل 3 ثواني لضمان الاستقرار
        }

        async function fetchGoldData() {
            try {
                // استخدام رابط مباشر يتخطى الحجب (Ticker)
                const res = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=XAUUSDT');
                const data = await res.json();
                
                if(data.price) {
                    const p = parseFloat(data.price).toFixed(2);
                    document.getElementById('main-price').innerText = `$${p}`;
                    document.getElementById('market-status').innerText = "✅ متصل بالسيولة اللحظية";
                    document.getElementById('market-status').style.color = "#00ff88";
                    logMsg(`سعر الذهب الآن: $${p}`);
                }
            } catch(e) { 
                logMsg("فشل الاتصال المباشر، جاري التبديل للجسر الاحتياطي..."); 
                try {
                    // جسر احتياطي في حال فشل الأول
                    const resBackup = await fetch('https://api1.binance.com/api/v3/ticker/price?symbol=XAUUSDT');
                    const dataB = await resBackup.json();
                    document.getElementById('main-price').innerText = `$${parseFloat(dataB.price).toFixed(2)}`;
                } catch(err) {
                    logMsg("تحقق من اتصالك بالإنترنت يا بطل.");
                }
            }
        }

        function logMsg(m) {
            const t = document.getElementById('terminal');
            t.innerHTML = `> [${new Date().toLocaleTimeString()}] ${m}<br>` + t.innerHTML;
        }
    </script>
</body>
</html>
