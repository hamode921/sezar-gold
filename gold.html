<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEZAR GOLD RADAR PRO</title>

<style>
:root {
    --gold:#ffd700;
    --bg:#000;
    --red:#ff4d4d;
    --green:#00ff88;
    --neon:#00f2ff;
}

body {
    background:#000;
    color:#fff;
    font-family:Segoe UI;
    text-align:center;
    padding:15px;
}

.container {
    max-width:500px;
    margin:auto;
}

.price-box {
    border:1px dashed #333;
    padding:30px;
    margin-bottom:25px;
}

.price {
    font-size:55px;
    color:var(--neon);
    font-weight:bold;
}

.ratio {
    margin:15px;
    font-weight:bold;
}

.bar {
    height:10px;
    background:#111;
    display:flex;
    border:1px solid #222;
}

.bar div {
    height:100%;
}

.wall {
    padding:12px;
    border-bottom:1px solid #111;
    display:flex;
    justify-content:space-between;
}

.signal {
    margin-top:25px;
    padding:20px;
    font-size:22px;
    font-weight:bold;
    border:2px solid #333;
}

.buy { color:var(--green); border-color:var(--green); }
.sell { color:var(--red); border-color:var(--red); }
</style>
</head>

<body onload="ignite()">

<div class="container">

<div class="price-box">
<div class="price" id="price">LOADING...</div>
</div>

<div class="ratio">
BUY: <span id="bp">0</span>% | SELL: <span id="sp">0</span>%
</div>

<div class="bar">
<div id="bf" style="width:50%;background:var(--green)"></div>
<div id="sf" style="width:50%;background:var(--red)"></div>
</div>

<h3 style="color:red">SELL ZONES 🔴</h3>
<div id="sl"></div>

<h3 style="color:lime">BUY ZONES 🟢</h3>
<div id="bl"></div>

<div id="sig" class="signal">ANALYZING...</div>

</div>

<script>
let priceHistory = [];
let prevPrice = 0;

function ignite(){
    update();
    setInterval(update,1000);
}

// API الذهب (مع Backup)
async function getGoldPrice(){
    try{
        let r = await fetch("https://api.metals.live/v1/spot");
        let d = await r.json();
        let g = d.find(x=>x.gold);
        if(g) return g.gold;

        r = await fetch("https://api.gold-api.com/price/XAUUSD");
        d = await r.json();
        return d.price;
    }catch{
        return 0;
    }
}

async function update(){
    try{
        let price = await getGoldPrice();

        if(!price){
            document.getElementById("price").innerText="ERROR";
            return;
        }

        document.getElementById("price").innerText="$"+price.toFixed(2);

        priceHistory.push(price);
        if(priceHistory.length>20) priceHistory.shift();

        let momentum = price - priceHistory[0];
        let strength = Math.abs(momentum);

        let up = price > prevPrice;
        let down = price < prevPrice;

        let buy = Math.max(0,momentum*100);
        let sell = Math.max(0,-momentum*100);

        let total = buy+sell || 1;

        let bp = ((buy/total)*100).toFixed(1);
        let sp = ((sell/total)*100).toFixed(1);

        document.getElementById("bp").innerText=bp;
        document.getElementById("sp").innerText=sp;

        document.getElementById("bf").style.width=bp+"%";
        document.getElementById("sf").style.width=sp+"%";

        let sig = document.getElementById("sig");

        if(strength>1.5 && up){
            sig.innerText="STRONG BUY 🚀";
            sig.className="signal buy";
        }
        else if(strength>1.5 && down){
            sig.innerText="STRONG SELL 🔻";
            sig.className="signal sell";
        }
        else if(strength<0.5){
            sig.innerText="NO TRADE ⚠️";
            sig.className="signal";
        }
        else{
            sig.innerText="WAIT ⏳";
            sig.className="signal";
        }

        renderZones(price);

        prevPrice = price;

    }catch(e){
        console.log(e);
    }
}

// مناطق السيولة
function renderZones(price){
    let sell = [
        (price+2).toFixed(2),
        (price+4).toFixed(2),
        (price+6).toFixed(2)
    ];

    let buy = [
        (price-2).toFixed(2),
        (price-4).toFixed(2),
        (price-6).toFixed(2)
    ];

    document.getElementById("sl").innerHTML = sell.map(p=>`
        <div class="wall">
            <span>🔴 ${p}</span>
            <span>Liquidity</span>
        </div>
    `).join("");

    document.getElementById("bl").innerHTML = buy.map(p=>`
        <div class="wall">
            <span>🟢 ${p}</span>
            <span>Liquidity</span>
        </div>
    `).join("");
}
</script>

</body>
</html>
