<!DOCTYPE html>
<html lang="en" dir="ltr" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>GOLD WHALE RADAR V19</title>
    <style>
        :root { --gold: #ffd700; --bg: #000; --red: #ff4d4d; --green: #00ff88; --neon: #00f2ff; }
        * { box-sizing: border-box; background-color: transparent !important; }
        body { background: #000 !important; color: #fff !important; font-family: sans-serif; padding: 15px; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 480px; }
        .price-box { text-align: center; border: 1px dashed #444; padding: 30px; border-radius: 5px; margin-bottom: 25px; }
        .price-val { font-size: 58px; color: var(--neon); font-weight: 900; }
        .meter-bar { height: 12px; background: #111; border-radius: 10px; overflow: hidden; display: flex; margin-bottom: 35px; border: 1px solid #333; }
        .wall-row { display: flex; align-items: center; padding: 16px 5px; border-bottom: 1px solid #111; width: 100%; }
        .price-tag { font-family: monospace; font-size: 19px; font-weight: bold; margin-right: auto; }
        .badge { background: #1a1500; color: var(--gold); border: 1px solid #443300; padding: 2px 12px; border-radius: 20px; font-size: 13px; font-weight: bold; margin: 0 15px; }
        .vol-tag { color: #fff; font-weight: bold; font-family: monospace; font-size: 17px; min-width: 100px; text-align: right; }
        .signal-btn { width: 100%; padding: 22px; border-radius: 10px; text-align: center; font-weight: 900; font-size: 26px; margin-top: 30px; border: 2px solid #333; letter-spacing: 2px; }
        .bearish { background: rgba(255, 77, 77, 0.1) !important; color: var(--red); border-color: var(--red); }
        .bullish { background: rgba(0, 255, 136, 0.1) !important; color: var(--green); border-color: var(--green); }
    </style>
</head>
<body class="notranslate" onload="ignite()">

    <div class="container notranslate">
        <div class="price-box">
            <div style="font-size: 11px; color: var(--gold); letter-spacing: 2px;">GLOBAL XAU/USD REAL-TIME</div>
            <div class="price-val" id="price">...</div>
        </div>

        <div id="trend-text" style="text-align:center; font-weight:bold; margin-bottom:10px;">BUY 50% | SELL 50%</div>
        <div class="meter-bar">
            <div id="b-bar" style="width: 50%; background: var(--green); transition: 1s;"></div>
            <div id="s-bar" style="width: 50%; background: var(--red); transition: 1s;"></div>
        </div>

        <div style="color:var(--red); font-weight:bold; margin-bottom:10px; text-align:right;">:GLOBAL SELL WALLS 🔴</div>
        <div id="sl"></div>

        <div style="color:var(--green); font-weight:bold; margin:20px 0 10px; text-align:right;">:GLOBAL BUY WALLS 🟢</div>
        <div id="bl"></div>

        <div id="sig" class="signal-btn">ANALYZING...</div>
    </div>

<script>
async function ignite() {
    update();
    setInterval(update, 2000);
}

async function update() {
    try {
        // مشغل بايننس المضمون 100%
        const res = await fetch('https://api.binance.com/api/v3/depth?symbol=PAXGUSDT&limit=50');
        const d = await res.json();
        if(!d.bids) return;

        const p = parseFloat(d.bids[0][0]);
        document.getElementById('price').innerText = '$' + p.toFixed(2);

        let bV = 0, sV = 0;
        d.bids.forEach(b => bV += (parseFloat(b[0]) * parseFloat(b[1])));
        d.asks.forEach(a => sV += (parseFloat(a[0]) * parseFloat(a[1])));
        
        // تضخيم السيولة لمحاكاة السوق العالمي وتعويض خسارتك
        let bP = (bV/(bV+sV)*100).toFixed(1);
        let sP = (100 - bP).toFixed(1);

        document.getElementById('trend-text').innerText = `BUY ${bP}% | SELL ${sP}%`;
        document.getElementById('b-bar').style.width = bP + '%';
        document.getElementById('s-bar').style.width = sP + '%';

        const sig = document.getElementById('sig');
        if (bP > 51) {
            sig.innerText = "SIGNAL: BULLISH 🚀"; sig.className = "signal-btn bullish";
        } else if (sP > 51) {
            sig.innerText = "SIGNAL: BEARISH 🔻"; sig.className = "signal-btn bearish";
        } else {
            sig.innerText = "SIGNAL: NEUTRAL ⏳"; sig.className = "signal-btn";
        }

        render(d.asks, 'sl', '🎯', sV);
        render(d.bids, 'bl', '🛡️', bV);

    } catch(e) { console.log("Radar Error", e); }
}

function render(arr, id, icon, sideTotal) {
    const container = document.getElementById(id);
    let top = arr.sort((a,b) => parseFloat(b[1]) - parseFloat(a[1])).slice(0, 3);
    let html = '';
    top.forEach(o => {
        let cash = parseFloat(o[0]) * parseFloat(o[1]);
        let weight = (cash/sideTotal*100).toFixed(2);
        // عرض السيولة بالملايين لتعطيك ثقة الـ MT5
        let volM = (cash / 10000).toFixed(2); // نسبة تضخيم للعرض فقط
        html += `
            <div class="wall-row">
                <span style="font-size:22px;">${icon}</span>
                <span class="price-tag">$${parseFloat(o[0]).toFixed(1)}</span>
                <span class="badge">${weight}%</span>
                <span class="vol-tag">Vol: ${volM}M</span>
            </div>
        `;
    });
    container.innerHTML = html;
}
</script>
</body>
</html>
