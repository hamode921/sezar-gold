<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLD HUNTER V1.2 | سيزار</title>
    <style>
        :root { --gold: #fcc419; --bg: #030303; --neon: #00f2ff; }
        body { background: var(--bg); color: #eee; font-family: sans-serif; padding: 10px; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .header-box { border: 2px solid var(--gold); background: #000; width: 90%; max-width: 400px; padding: 20px; border-radius: 20px; text-align: center; box-shadow: 0 0 20px rgba(252,196,25,0.3); }
        .price-tag { font-size: 45px; color: var(--neon); font-weight: bold; margin: 15px 0; text-shadow: 0 0 15px var(--neon); }
        .terminal { width: 90%; max-width: 400px; height: 80px; background: #000; border: 1px solid #222; margin-top: 20px; padding: 10px; font-size: 11px; color: #555; overflow-y: auto; border-radius: 10px; text-align: left; }
    </style>
</head>
<body onload="startSezarRadar()">

    <div class="header-box">
        <h3 style="margin:0; color:var(--gold);">🔱 GOLD HUNTER V1.2 🔱</h3>
        <div id="market-status" style="font-size: 12px; color: #777; margin-top: 10px;">جاري الاتصال بالقمر الصناعي...</div>
        <div class="price-tag" id="main-price">0.00</div>
        <div style="font-size: 14px; color: var(--gold);">سعر أونصة الذهب (USD)</div>
    </div>

    <div class="terminal" id="term"></div>

    <script>
        async function startSezarRadar() {
            logMsg("سيزار.. جاري كسر الحواجز وسحب السعر.");
            getGoldPrice();
            setInterval(getGoldPrice, 5000); // تحديث كل 5 ثواني لضمان عدم الحظر
        }

        async function getGoldPrice() {
            try {
                // استخدام رابط خارجي مفتوح لا يمكن حظره
                const response = await fetch('https://min-api.cryptocompare.com/data/price?fsym=XAU&tsyms=USD');
                const data = await response.json();
                
                if(data.USD) {
                    document.getElementById('main-price').innerText = `$${data.USD.toLocaleString()}`;
                    document.getElementById('market-status').innerText = "✅ متصل عبر القمر الصناعي (مشفر)";
                    document.getElementById('market-status').style.color = "#00ff88";
                    logMsg(`تم تحديث السعر: $${data.USD}`);
                }
            } catch(e) { 
                logMsg("حتى القمر الصناعي محجوز؟ شغل VPN يا بطل."); 
            }
        }

        function logMsg(m) {
            const t = document.getElementById('term');
            t.innerHTML = `> [${new Date().toLocaleTimeString()}] ${m}<br>` + t.innerHTML;
        }
    </script>
</body>
</html>
