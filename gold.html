<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLD RADAR V2.0 | تصفية الحيتان</title>
    <style>
        :root { --gold: #ffd700; --bg: #000; --neon: #00f2ff; --red: #ff4d4d; --green: #00ff88; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; padding: 10px; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .sezar-box { border: 2px solid var(--gold); background: #080808; width: 95%; max-width: 450px; padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 15px; box-shadow: 0 0 25px rgba(255,215,0,0.3); }
        .price { font-size: 45px; color: var(--neon); font-weight: bold; margin: 10px 0; }
        .pressure-bar { width: 100%; height: 14px; background: #222; border-radius: 7px; margin: 15px 0; overflow: hidden; display: flex; border: 1px solid #333; }
        .whale-card { background: #0a0a0a; width: 95%; max-width: 450px; border-radius: 15px; border: 1px solid #222; padding: 15px; box-sizing: border-box; min-height: 150px; }
        .wall-row { display: flex; justify-content: space-between; padding: 15px 5px; border-bottom: 1px solid #111; font-size: 15px; align-items: center; animation: flash 0.5s; }
        .money-tag { color: var(--gold); font-weight: bold; font-family: monospace; font-size: 18px; }
        @keyframes flash { from { background: #222; } to { background: transparent; } }
    </style>
</head>
<body onload="startSezarRadar()">

    <div class="sezar-box">
        <h2 style="margin:0; font-size: 18px; color:var(--gold);">🔱 رادار تصفية الحيتان (+100K) 🔱</h2>
        <div class="price" id="p">0.00</div>
        <div class="pressure-bar">
            <div id="buy-bar" style="width: 50%; background: var(--green); transition: 0.8s;"></div>
            <div id="sell-bar" style="width: 50%; background: var(--red); transition: 0.8s;"></div>
        </div>
    </div>

    <div class="whale-card" id="walls-output">
        <p style="text-align:center; color:#555; padding: 20px;">بانتظار ظهور حيتان الملايين...</p>
    </div>

    <script>
        async function startSezarRadar() {
            updateData();
            setInterval(updateData, 2000);
        }

        async function updateData() {
            try {
                const res = await fetch('https://api.binance.com/api/v3/depth?symbol=PAXGUSDT&limit=50'); // سحب عمق أكبر للتصفية
                const d = await res.json();
                if(!d.bids) return;

                const currentPrice = parseFloat(d.bids[0][0]);
                document.getElementById('p').innerText = `$${currentPrice.toFixed(2)}`;

                let bVol = d.bids.reduce((a, b) => a + parseFloat(b[1]), 0);
                let aVol = d.asks.reduce((a, b) => a + parseFloat(b[1]), 0);
                let total = bVol + aVol;
                document.getElementById('buy-bar').style.width = (bVol/total * 100) + "%";
                document.getElementById('sell-bar').style.width = (aVol/total * 100) + "%";

                const out = document.getElementById('walls-output');
                let html = '';
                
                // تصفية وعرض جدران البيع (فوق 100 ألف دولار)
                const bigAsks = d.asks.filter(a => (parseFloat(a[0]) * parseFloat(a[1])) >= 100000);
                bigAsks.sort((a, b) => b[1] - a[1]).slice(0, 4).forEach(a => {
                    let cash = (parseFloat(a[0]) * parseFloat(a[1]));
                    let formattedCash = cash >= 1000000 ? (cash/1000000).toFixed(2) + "M" : (cash/1000).toFixed(0) + "K";
                    html += `<div class="wall-row"><span style="color:var(--red); font-weight:bold;">حوت SELL</span><span>$${parseFloat(a[0]).toFixed(2)}</span><span class="money-tag">$${formattedCash}</span></div>`;
                });

                // تصفية وعرض جدران الشراء (فوق 100 ألف دولار)
                const bigBids = d.bids.filter(b => (parseFloat(b[0]) * parseFloat(b[1])) >= 100000);
                bigBids.sort((a, b) => b[1] - a[1]).slice(0, 4).forEach(b => {
                    let cash = (parseFloat(b[0]) * parseFloat(b[1]));
                    let formattedCash = cash >= 1000000 ? (cash/1000000).toFixed(2) + "M" : (cash/1000).toFixed(0) + "K";
                    html += `<div class="wall-row"><span style="color:var(--green); font-weight:bold;">حوت BUY</span><span>$${parseFloat(b[0]).toFixed(2)}</span><span class="money-tag">$${formattedCash}</span></div>`;
                });

                out.innerHTML = html || '<p style="text-align:center; color:#444;">لا يوجد حيتان حالياً.. السوق هادئ.</p>';
            } catch (e) {}
        }
    </script>
</body>
</html>
