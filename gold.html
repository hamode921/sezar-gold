<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLD TERMINAL V8.0</title>
    <style>
        :root { --gold: #ffd700; --bg: #000; --red: #ff4d4d; --green: #00ff88; --neon: #00f2ff; }
        * { box-sizing: border-box; background-color: transparent !important; }
        body { background: #000 !important; color: #fff !important; font-family: 'Segoe UI', sans-serif; padding: 15px; margin: 0; display: flex; flex-direction: column; align-items: center; }
        
        .main-container { width: 100%; max-width: 480px; }
        .price-box { text-align: center; border: 1px dashed #333; padding: 30px; border-radius: 5px; margin-bottom: 20px; }
        .price-val { font-size: 55px; color: var(--neon); font-weight: 900; }

        .ratio-bar { display: flex; justify-content: center; gap: 20px; font-size: 18px; font-weight: bold; margin-bottom: 10px; }
        .meter-container { height: 10px; background: #111; border-radius: 10px; overflow: hidden; display: flex; margin-bottom: 30px; border: 1px solid #222; }

        .section-label { font-size: 16px; font-weight: bold; margin: 15px 0; display: flex; align-items: center; justify-content: flex-end; gap: 10px; }
        
        .wall-row { display: flex; justify-content: space-between; align-items: center; padding: 15px 5px; border-bottom: 1px solid #111; font-size: 16px; }
        .perc-box { background: #1a1500; color: var(--gold); border: 1px solid #443300; padding: 2px 12px; border-radius: 20px; font-size: 13px; font-weight: bold; }
        .vol-val { color: #fff; font-weight: bold; font-family: monospace; }
        
        .signal-btn { width: 100%; padding: 22px; border-radius: 8px; text-align: center; font-weight: 900; font-size: 24px; margin-top: 30px; border: 2px solid #333; letter-spacing: 2px; }
        .bearish { background: rgba(255, 77, 77, 0.1) !important; color: var(--red); border-color: var(--red); }
        .bullish { background: rgba(0, 255, 136, 0.1) !important; color: var(--green); border-color: var(--green); }
    </style>
</head>
<body onload="start()">

    <div class="main-container">
        <div class="price-box">
            <div class="price-val" id="price">$0.00</div>
        </div>

        <div class="ratio-bar">
            <span style="color:var(--green)">BUY: <span id="b-p">50</span>%</span>
            <span>|</span>
            <span style="color:var(--red)">SELL: <span id="s-p">50</span>%</span>
        </div>
        <div class="meter-container">
            <div id="b-fill" style="width: 50%; background: var(--green);"></div>
            <div id="s-fill" style="width: 50%; background: var(--red);"></div>
        </div>

        <div class="section-label" style="color:var(--red)">:SELL WALLS (30s) 🔴</div>
        <div id="sell-list"></div>

        <div class="section-label" style="color:var(--green)">:BUY WALLS (30s) 🟢</div>
        <div id="buy-list"></div>

        <div id="signal" class="signal-btn">ANALYZING...</div>
    </div>

    <script>
        async function start() {
            update();
            setInterval(update, 2000);
        }

        async function update() {
            try {
                const res = await fetch('https://api.binance.com/api/data-api/v3/asset/asset/depth?symbol=PAXGUSDT&limit=100');
                const json = await res.json();
                const d = json.data;
                
                const p = parseFloat(d.bids[0][0]);
                document.getElementById('price').innerText = `$${p.toFixed(2)}`;

                let bV = d.bids.reduce((a, b) => a + (parseFloat(b[0])*parseFloat(b[1])), 0);
                let sV = d.asks.reduce((a, b) => a + (parseFloat(a[0])*parseFloat(a[1])), 0);
                let total = bV + sV;

                let bP = (bV/total*100).toFixed(1);
                let sP = (sV/total*100).toFixed(1);

                document.getElementById('b-p').innerText = bP;
                document.getElementById('s-p').innerText = sP;
                document.getElementById('b-fill').style.width = bP + "%";
                document.getElementById('s-fill').style.width = sP + "%";

                const sig = document.getElementById('signal');
                if(sV > bV) {
                    sig.innerText = "SIGNAL: BEARISH ●"; sig.className = "signal-btn bearish";
                } else {
                    sig.innerText = "SIGNAL: BULLISH ●"; sig.className = "signal-btn bullish";
                }

                render(d.asks, 'sell-list', '🎯', sV);
                render(d.bids, 'buy-list', '🛡️', bV);
            } catch(e) {}
        }

        function render(arr, id, icon, sideTotal) {
            const out = document.getElementById(id);
            // تصفية الأوامر الحقيقية فقط (التي تبتعد عن السعر الحالي لتجنب الفكة)
            let filtered = arr.map(o => ({p: o[0], v: parseFloat(o[0])*parseFloat(o[1])}))
                            .sort((a,b) => b.v - a.v)
                            .slice(0, 3);

            let html = '';
            filtered.forEach(o => {
                let weight = (o.v/sideTotal*100).toFixed(2);
                html += `
                    <div class="wall-row">
                        <span style="font-size:20px;">${icon}</span>
                        <span style="font-family:monospace;">$${parseFloat(o.p).toFixed(1)}</span>
                        <span class="perc-box">${weight}%</span>
                        <span class="vol-val">Vol: ${(o.v/1000000).toFixed(2)}M</span>
                    </div>
                `;
            });
            out.innerHTML = html;
        }
    </script>
</body>
</html>
