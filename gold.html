<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLD HUNTER V1.2 | المطور سيزار</title>
    <style>
        :root { --gold: #fcc419; --bg: #030303; --neon: #00f2ff; --danger: #ff4d4d; }
        body { background: var(--bg); color: #eee; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 10px; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .header-box { border: 2px solid var(--gold); background: #000; width: 95%; max-width: 480px; padding: 15px; border-radius: 15px; text-align: center; box-shadow: 0 0 15px rgba(252, 196, 25, 0.2); margin-bottom: 15px; }
        .price-tag { font-size: 38px; color: var(--neon); font-weight: 800; margin: 5px 0; letter-spacing: -1px; }
        .whale-tracker { background: #0a0a0a; width: 95%; max-width: 480px; border-radius: 15px; border: 1px solid #1a1a1a; padding: 15px; box-sizing: border-box; }
        .row { display: flex; justify-content: space-between; align-items: center; padding: 12px 5px; border-bottom: 1px solid #111; font-size: 14px; transition: 0.3s; }
        .row:hover { background: #111; }
        .type-buy { color: #00ff88; font-weight: bold; text-shadow: 0 0 8px rgba(0,255,136,0.4); }
        .type-sell { color: var(--danger); font-weight: bold; text-shadow: 0 0 8px rgba(255,77,77,0.4); }
        .amount { color: var(--gold); font-family: monospace; font-size: 16px; }
        #terminal { width: 95%; max-width: 480px; height: 100px; background: #000; border: 1px solid #222; margin-top: 15px; padding: 10px; font-size: 11px; color: #555; overflow-y: auto; border-radius: 8px; }
    </style>
</head>
<body onload="initRadar()">

    <div class="header-box">
        <h3 style="margin:0; color:var(--gold); letter-spacing: 2px;">🔱 GOLD HUNTER V1.2 🔱</h3>
        <div style="font-size: 10px; opacity: 0.6;">مراقبة سيولة الذهب التاريخية ($4730+)</div>
        <div class="price-tag" id="main-price">0.00</div>
        <div id="market-status" style="font-size: 12px; font-weight: bold;">جاري تحليل الجدران...</div>
    </div>

    <div class="whale-tracker">
        <div style="display:flex; justify-content:space-between; font-size:11px; color:#444; margin-bottom:8px; padding:0 5px;">
            <span>السعر الناري</span><span>حجم الحوت ($)</span><span>العملية</span>
        </div>
        <div id="whale-output"></div>
    </div>

    <div id="terminal"></div>

    <script>
        let lastB = [], lastA = [];
        // ملاحظة: الكود يستخدم API القراءة فقط المحفوظ لسيزار
        
        async function initRadar() {
            logMsg("تم الاتصال بسيرفرات السيولة.. مراقبة الـ 4730 بدأت.");
            setInterval(fetchGoldData, 1500); // سرعة تحديث عالية للذهب
        }

        async function fetchGoldData() {
            try {
                const response = await fetch('https://api.binance.com/api/v3/depth?symbol=XAUUSDT&limit=15');
                const data = await response.json();
                const currentPrice = parseFloat(data.bids[0][0]);
                document.getElementById('main-price').innerText = `$${currentPrice.toFixed(2)}`;
                
                checkWhales(data.bids, data.asks);
                updateStatus(data.bids, data.asks);
            } catch(e) { logMsg("خطأ في الاتصال.. جاري المحاولة."); }
        }

        function checkWhales(bids, asks) {
            let hits = [];
            if(lastB.length > 0) {
                // تتبع حيتان الشراء عند مستويات الـ 4730
                if(bids[0][0] === lastB[0][0]) {
                    let diff = parseFloat(bids[0][1]) - parseFloat(lastB[0][1]);
                    if(diff > 0.3) hits.push({p: bids[0][0], v: diff * bids[0][0], t: 'BUY'});
                }
                // تتبع حيتان البيع
                if(asks[0][0] === lastA[0][0]) {
                    let diff = parseFloat(asks[0][1]) - parseFloat(lastA[0][1]);
                    if(diff > 0.3) hits.push({p: asks[0][0], v: diff * asks[0][0], t: 'SELL'});
                }
            }
            if(hits.length > 0) renderHits(hits);
            lastB = bids; lastA = asks;
        }

        function renderHits(arr) {
            const out = document.getElementById('whale-output');
            arr.forEach(h => {
                const row = document.createElement('div');
                row.className = 'row';
                const vol = h.v >= 1000 ? (h.v/1000).toFixed(1) + "K" : h.v.toFixed(0);
                row.innerHTML = `
                    <span style="font-weight:bold;">$${h.p}</span>
                    <span class="amount">$${vol}</span>
                    <span class="${h.t==='BUY'?'type-buy':'type-sell'}">${h.t}</span>
                `;
                out.prepend(row);
                if(out.children.length > 7) out.removeChild(out.lastChild);
                if(h.v > 10000) logMsg(`🔱 حوت ضخم ضخ $${vol} عند سعر ${h.p}`);
            });
        }

        function updateStatus(bids, asks) {
            const status = document.getElementById('market-status');
            const bVol = bids.reduce((a, b) => a + parseFloat(b[1]), 0);
            const aVol = asks.reduce((a, b) => a + parseFloat(b[1]), 0);
            if(bVol > aVol) {
                status.innerText = "🔥 ضغط شراء (صعود)";
                status.style.color = "#00ff88";
            } else {
                status.innerText = "❄️ ضغط بيع (تصحيح)";
                status.style.color = "#ff4d4d";
            }
        }

        function logMsg(m) {
            const t = document.getElementById('terminal');
            t.innerHTML = `> [${new Date().toLocaleTimeString()}] ${m}<br>` + t.innerHTML;
        }
    </script>
</body>
</html>
