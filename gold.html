<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLD RADAR V2.1 | كاشف الأفخاخ</title>
    <style>
        :root { --gold: #ffd700; --bg: #000; --red: #ff4d4d; --green: #00ff88; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; padding: 10px; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .sezar-box { border: 2px solid var(--gold); background: #080808; width: 95%; max-width: 450px; padding: 15px; border-radius: 15px; text-align: center; margin-bottom: 10px; }
        .price { font-size: 40px; color: #00f2ff; font-weight: bold; }
        .whale-card { background: #0a0a0a; width: 95%; max-width: 450px; border-radius: 10px; border: 1px solid #222; padding: 10px; box-sizing: border-box; }
        .wall-row { display: flex; justify-content: space-between; padding: 8px 5px; border-bottom: 1px solid #111; font-size: 13px; }
        .money-tag { color: var(--gold); font-weight: bold; font-family: monospace; }
    </style>
</head>
<body onload="startSezarRadar()">

    <div class="sezar-box">
        <h2 style="margin:0; font-size: 16px; color:var(--gold);">🔱 كاشف أوامر الذهب المعلقة (+20K) 🔱</h2>
        <div class="price" id="p">0.00</div>
    </div>

    <div class="whale-card" id="walls-output">
        <p style="text-align:center; color:#555;">جاري مسح أعماق السوق...</p>
    </div>

    <script>
        async function startSezarRadar() {
            updateData();
            setInterval(updateData, 1500);
        }

        async function updateData() {
            try {
                // سحب عمق 100 مستوى (أقصى شي ممكن)
                const res = await fetch('https://api.binance.com/api/v3/depth?symbol=PAXGUSDT&limit=100');
                const d = await res.json();
                
                const currentPrice = parseFloat(d.bids[0][0]);
                document.getElementById('p').innerText = `$${currentPrice.toFixed(2)}`;

                const out = document.getElementById('walls-output');
                let html = '<div style="text-align:center; color:#444; font-size:10px; margin-bottom:5px;">الأوامر المعلقة البعيدة والقريبة</div>';
                
                // تصفية أوامر البيع (المقاومات) فوق 20 ألف دولار
                const bigAsks = d.asks.filter(a => (parseFloat(a[0]) * parseFloat(a[1])) >= 20000).slice(0, 5);
                bigAsks.forEach(a => {
                    let cash = (parseFloat(a[0]) * parseFloat(a[1]));
                    html += `<div class="wall-row"><span style="color:var(--red)">SELL LIMIT</span><span>$${parseFloat(a[0]).toFixed(2)}</span><span class="money-tag">$${(cash/1000).toFixed(0)}K</span></div>`;
                });

                html += `<div style="height:1px; background:#333; margin:8px 0;"></div>`;

                // تصفية أوامر الشراء (الدعوم) فوق 20 ألف دولار
                const bigBids = d.bids.filter(b => (parseFloat(b[0]) * parseFloat(b[1])) >= 20000).slice(0, 5);
                bigBids.forEach(b => {
                    let cash = (parseFloat(b[0]) * parseFloat(b[1]));
                    html += `<div class="wall-row"><span style="color:var(--green)">BUY LIMIT</span><span>$${parseFloat(b[0]).toFixed(2)}</span><span class="money-tag">$${(cash/1000).toFixed(0)}K</span></div>`;
                });

                out.innerHTML = html;
            } catch (e) {}
        }
    </script>
</body>
</html>
