<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLD HUNTER V1.2 | سيزار</title>
    <style>
        :root { --gold: #fcc419; --bg: #030303; --neon: #00f2ff; --danger: #ff4d4d; }
        body { background: var(--bg); color: #eee; font-family: sans-serif; padding: 10px; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .header-box { border: 2px solid var(--gold); background: #000; width: 95%; max-width: 480px; padding: 15px; border-radius: 15px; text-align: center; margin-bottom: 15px; }
        .price-tag { font-size: 38px; color: var(--neon); font-weight: 800; margin: 5px 0; }
        .whale-tracker { background: #0a0a0a; width: 95%; max-width: 480px; border-radius: 15px; border: 1px solid #1a1a1a; padding: 15px; box-sizing: border-box; }
        .row { display: flex; justify-content: space-between; padding: 12px 5px; border-bottom: 1px solid #111; font-size: 14px; }
        #terminal { width: 95%; max-width: 480px; height: 80px; background: #000; border: 1px solid #222; margin-top: 15px; padding: 10px; font-size: 10px; color: #555; overflow-y: auto; border-radius: 8px; }
    </style>
</head>
<body onload="initRadar()">

    <div class="header-box">
        <h3 style="margin:0; color:var(--gold);">🔱 GOLD HUNTER V1.2 🔱</h3>
        <div class="price-tag" id="main-price">جاري الجلب..</div>
        <div id="market-status" style="font-size: 12px; font-weight: bold;">انتظار البيانات...</div>
    </div>

    <div class="whale-tracker">
        <div id="whale-output"></div>
    </div>

    <div id="terminal"></div>

    <script>
        let lastB = [], lastA = [];

        async function initRadar() {
            logMsg("تم الربط.. صيد الـ 4730 بدأ!");
            setInterval(fetchGoldData, 1500);
        }

        async function fetchGoldData() {
            try {
                // سحب السعر اللحظي للذهب من بايننس
                const response = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=XAUUSDT');
                const ticker = await response.json();
                document.getElementById('main-price').innerText = `$${parseFloat(ticker.price).toFixed(2)}`;
                
                // سحب السيولة
                const depthRes = await fetch('https://api.binance.com/api/v3/depth?symbol=XAUUSDT&limit=10');
                const data = await depthRes.json();
                
                updateStatus(data.bids, data.asks);
            } catch(e) { 
                logMsg("جاري الاتصال بالسيرفر..."); 
            }
        }

        function updateStatus(bids, asks) {
            const status = document.getElementById('market-status');
            const bVol = bids.reduce((a, b) => a + parseFloat(b[1]), 0);
            const aVol = asks.reduce((a, b) => a + parseFloat(b[1]), 0);
            if(bVol > aVol) {
                status.innerText = "🔥 ضغط شراء قوي";
                status.style.color = "#00ff88";
            } else {
                status.innerText = "❄️ ضغط بيع (تصحيح)";
                status.style.color = "#ff4d4d";
            }
        }

        function logMsg(m) {
            const t = document.getElementById('terminal');
            t.innerHTML = `> ${m}<br>` + t.innerHTML;
        }
    </script>
</body>
</html>
