<!DOCTYPE html>
<html lang="en" dir="ltr"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLD TERMINAL V11.1 | سيزار</title>
    <style>
        :root { --gold: #ffd700; --bg: #000; --red: #ff4d4d; --green: #00ff88; --neon: #00f2ff; }
        * { box-sizing: border-box; background-color: transparent !important; color-scheme: dark; }
        body { background: #000 !important; color: #fff !important; font-family: 'Segoe UI', sans-serif; padding: 10px; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 480px; }
        
        /* السعر الرئيسي بالوسط */
        .price-card { text-align: center; border: 1px dashed #333; padding: 25px; border-radius: 10px; margin-bottom: 25px; }
        .price-val { font-size: 58px; color: var(--neon); font-weight: 900; }

        /* مسطرة قوة الاتجاه مع النسب باليسار */
        .ratio-bar { display: flex; justify-content: flex-start; gap: 20px; font-size: 16px; font-weight: bold; margin-bottom: 10px; }
        .meter { height: 10px; background: #111; border-radius: 10px; overflow: hidden; display: flex; margin-bottom: 30px; border: 1px solid #222; }
        
        /* الجدران */
        .list-title { font-size: 16px; font-weight: bold; margin: 20px 0 10px; display: flex; align-items: center; justify-content: flex-start; gap: 10px; border-bottom: 1px solid #111; padding-bottom: 8px; }
        .row { display: flex; justify-content: flex-start; align-items: center; padding: 14px 10px; border-bottom: 1px solid #111; gap: 15px; }
        .perc { background: rgba(255, 215, 0, 0.1); color: var(--gold); border: 1px solid #443300; padding: 2px 10px; border-radius: 15px; font-size: 12px; font-weight: bold; }
        .vol { color: #fff; font-weight: bold; font-family: monospace; font-size: 16px; margin-left: auto; /* دفع الـ Vol لليسار */ }

        /* الإشارة النهائية */
        .sig-box { width: 100%; padding: 22px; border-radius: 10px; text-align: center; font-weight: 900; font-size: 24px; margin-top: 30px; border: 2px solid #333; }
        .bear { background: rgba(255, 77, 77, 0.1) !important; color: var(--red); border-color: var(--red); }
        .bull { background: rgba(0, 255, 136, 0.1) !important; color: var(--green); border-color: var(--green); }
    </style>
</head>
<body onload="start()">

    <div class="container">
        <div class="price-card">
            <div class="price-val" id="price">$0.00</div>
        </div>

        <div class="ratio-bar">
            <span style="color:var(--green)">BUY: <span id="bp">50</span>%</span>
            <span>|</span>
            <span style="color:var(--red)">SELL: <span id="sp">50</span>%</span>
        </div>
        <div class="meter">
            <div id="bf" style="width: 50%; background: var(--green); transition: 1s;"></div>
            <div id="sf" style="width: 50%; background: var(--red); transition: 1s;"></div>
        </div>

        <div class="list-title" style="color:var(--red)">🔴 SELL WALLS (30s):</div>
        <div id="sl"></div>

        <div class="list-title" style="color:var(--green)">🟢 BUY WALLS (30s):</div>
        <div id="bl"></div>

        <div id="sig" class="sig-box">SCANNING...</div>
    </div>

    <script>
        async function start() {
            update();
            setInterval(update, 2000);
        }

        async function update() {
            try {
                const res = await fetch('https://api.binance.com/api/v3/depth?symbol=PAXGUSDT&limit=100');
                const d = await res.json();
                
                const p = parseFloat(d.bids[0][0]);
                document.getElementById('price').innerText = `$${p.toFixed(2)}`;

                let bV = 0, sV = 0;
                d.bids.forEach(b => bV += (parseFloat(b[0]) * parseFloat(b[1])));
                d.asks.forEach(a => sV += (parseFloat(a[0]) * parseFloat(a[1])));
                
                let total = bV + sV;
                if(total > 0) {
                    let bP = ((bV/total)*100).toFixed(1);
                    let sP = ((sV/total)*100).toFixed(1);
                    document.getElementById('bp').innerText = bP;
                    document.getElementById('sp').innerText = sP;
                    document.getElementById('bf').style.width = bP + "%";
                    document.getElementById('sf').style.width = sP + "%";

                    const sig = document.getElementById('sig');
                    if(sV > bV) {
                        sig.innerText = "● SIGNAL: BEARISH"; sig.className = "sig-box bear";
                    } else {
                        sig.innerText = "● SIGNAL: BULLISH"; sig.className = "sig-box bull";
                    }
                }

                render(d.asks, 'sl', '🎯', sV);
                render(d.bids, 'bl', '🛡️', bV);
            } catch(e) {}
        }

        function render(arr, id, icon, sideTotal) {
            const container = document.getElementById(id);
            let top = arr.sort((a,b) => (parseFloat(b[1])) - (parseFloat(a[1]))).slice(0, 3);
            let html = '';
            top.forEach(o => {
                let cash = parseFloat(o[0]) * parseFloat(o[1]);
                let weight = sideTotal > 0 ? ((cash/sideTotal)*100).toFixed(1) : "0.0";
                html += `
                    <div class="row">
                        <span style="font-size:20px;">${icon}</span>
                        <span style="font-family:monospace; font-size:16px;">$${parseFloat(o[0]).toFixed(1)}</span>
                        <span class="perc">${weight}%</span>
                        <span class="vol">Vol: ${ (cash/1000000).toFixed(2) }M</span>
                    </div>
                `;
            });
            container.innerHTML = html;
        }
    </script>
</body>
</html>
