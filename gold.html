<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLD HUNTER V1.3 | سيزار</title>
    <style>
        :root { --gold: #ffd700; --bg: #000; --neon: #00f2ff; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; padding: 10px; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .sezar-box { border: 2px solid var(--gold); background: #080808; width: 95%; max-width: 450px; padding: 20px; border-radius: 20px; text-align: center; box-shadow: 0 0 25px rgba(255,215,0,0.2); }
        .price { font-size: 48px; color: var(--neon); font-weight: bold; margin: 10px 0; }
        .status { font-size: 14px; color: var(--gold); border: 1px solid #333; padding: 5px 15px; border-radius: 50px; display: inline-block; }
        #log { width: 95%; max-width: 450px; height: 120px; background: #050505; border: 1px solid #222; margin-top: 15px; padding: 10px; font-size: 11px; color: #555; overflow-y: auto; border-radius: 12px; text-align: left; }
    </style>
</head>
<body onload="powerOn()">

    <div class="sezar-box">
        <h2 style="margin:0; font-size: 20px; color:var(--gold);">🔱 GOLD RADAR V1.3 🔱</h2>
        <p style="font-size: 10px; opacity: 0.5;">سيزار.. نظام استعادة السيولة المباشر</p>
        <div class="price" id="p">SCAN...</div>
        <div class="status" id="s">ربط المحرك...</div>
    </div>

    <div id="log"></div>

    <script>
        // استخدام "نبض بايننس المباشر" من الذاكرة
        const socketURL = "wss://stream.binance.com:9443/ws/xauusdt@ticker";
        let ws;

        function powerOn() {
            addLog("جاري تشغيل محرك التتبع الخاص بسيزار...");
            connect();
        }

        function connect() {
            ws = new WebSocket(socketURL);
            
            ws.onopen = () => {
                addLog("✅ تم الربط المباشر بأسطول بايننس!");
                document.getElementById('s').innerText = "متصل بنبض الذهب";
            };

            ws.onmessage = (evt) => {
                const data = JSON.parse(evt.data);
                const price = parseFloat(data.c).toFixed(2);
                document.getElementById('p').innerText = `$${price}`;
                
                // تحليل النبض (صعود أو هبوط)
                const change = parseFloat(data.P);
                if(change > 0) {
                    document.getElementById('p').style.color = "#00ff88";
                    document.getElementById('s').innerText = "🔥 صعود لحظي: " + change + "%";
                } else {
                    document.getElementById('p').style.color = "#ff4d4d";
                    document.getElementById('s').innerText = "❄️ هبوط لحظي: " + change + "%";
                }
            };

            ws.onerror = (e) => {
                addLog("⚠️ خطأ في المحرك.. جاري إعادة التشغيل.");
                setTimeout(connect, 3000);
            };

            ws.onclose = () => {
                addLog("🔌 انقطع الاتصال.. جاري الربط التلقائي.");
                setTimeout(connect, 3000);
            };
        }

        function addLog(m) {
            const l = document.getElementById('log');
            l.innerHTML = `> [${new Date().toLocaleTimeString()}] ${m}<br>` + l.innerHTML;
        }
    </script>
</body>
</html>
