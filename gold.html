<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLD TERMINAL V6.0</title>
    <style>
        :root { --gold: #ffd700; --bg: #000; --red: #ff4d4d; --green: #00ff88; --neon: #00f2ff; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; padding: 10px; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .main-container { width: 100%; max-width: 480px; border: 1px solid #222; padding: 15px; border-radius: 10px; background: #000; }
        .price-box { text-align: center; margin-bottom: 30px; border: 1px dashed #333; padding: 25px; border-radius: 10px; }
        .price-val { font-size: 58px; color: var(--neon); font-weight: 900; }
        
        /* مسطرة قوة الاتجاه */
        .trend-box { text-align: center; margin-bottom: 20px; }
        .trend-title { font-size: 14px; color: #888; margin-bottom: 10px; }
        .trend-perc { font-size: 24px; color: var(--gold); font-weight: bold; margin-bottom: 5px; }
        .meter-container { background: #111; height: 12px; border-radius: 10px; overflow: hidden; display: flex; border: 1px solid #222; margin: 10px 0; }
        .meter-fill { height: 100%; transition: 1s; }
        
        .ratio-text { display: flex; justify-content: center; gap: 20px; font-size: 16px; font-weight: bold; margin-bottom: 20px; }
        
        /* الجدران */
        .section-header { text-align: right; font-size: 16px; font-weight: bold; margin: 15px 0; display: flex; align-items: center; justify-content: flex-end; gap: 8px; }
        .wall-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 5px; border-bottom: 1px solid #111; font-size: 15px; }
        .icon-tag { font-size: 18px; }
        .perc-badge { background: #1a1500; color: var(--gold); border: 1px solid #443300; padding: 2px 12px; border-radius: 20px; font-size: 13px; font-weight: bold; }
        .vol-text { color: #fff; font-weight: bold; font-family: monospace; }
        
        /* الإشارة */
        .signal-btn { width: 100%; padding: 22px; border-radius: 10px; text-align: center; font-weight: 900; font-size: 24px; margin-top: 25px; border: 2px solid #333; }
        .bearish { background: rgba(255, 77, 77, 0.1); color: var(--red); border-color: var(--red); }
        .bullish { background: rgba(0, 255, 136, 0.1); color: var(--green); border-color: var(--green); }
    </style>
</head>
<body onload="ignite()">

    <div class="main-container">
        <div class="price-box">
            <div class="price-val" id="price">$0.00</div>
        </div>

        <div class="trend-box">
            <div class="trend-title">TREND FORCE (قوة الاتجاه)</div>
            <div class="trend-perc" id="trend-val">0%</div>
            <div class="meter-container">
                <div id="buy-bar" style="width: 50%; background: var(--green);"></div>
                <div id="sell-bar" style="width: 50%; background: var(--red);"></div>
            </div>
        </div>

        <div class="ratio-text">
            <span style="color:var(--green)">BUY: <span id="b-ratio">0</span>%</span>
            <span>|</span>
            <span style="color:var(--red)">SELL: <span id="s-ratio">0</span>%</span>
        </div>

        <div class="section-header" style="color:var(--red)">SELL WALLS (30s) <span class="icon-tag">🔴</span></div>
        <div id="sell-walls"></div>

        <div class="section-header" style="color:var(--green)">BUY WALLS (30s) <span class="icon-tag">🟢</span></div>
        <div id="buy-walls"></div>

        <div id="signal" class="signal-btn">ANALYZING...</div>
    </div>

    <script>
        async function ignite() {
            update();
            setInterval(update, 2000);
        }

        function formatMoney(v) {
            if (v >= 1000000) return (v/1000000).toFixed(2) + "M";
            return (v/1000).toFixed(2) + "M"; // تحويل المبالغ تحت المليون لتبدو مثل الـ 0.66M بالصورة
        }

        async function update() {
            try {
                const res = await fetch('https://api.binance.com/api/v3/depth?symbol=PAXGUSDT&limit=100');
                const d = await res.json();
                
                const p = parseFloat(d.bids[0][0]);
                document.getElementById('price').innerText = `$${p.toFixed(2)}`;

                let bV = d.bids.reduce((a, b) => a + (parseFloat(b[0])*parseFloat(b[1])), 0);
                let sV = d.asks.reduce((a, b) => a + (parseFloat(a[0])*parseFloat(a[1])), 0);
                let total = bV + sV;
                
                let bP = (bV/total * 100).toFixed(1);
                let sP = (sV/total * 100).toFixed(1);

                document.getElementById('trend-val').innerText = bP + "%";
                document.getElementById('b-ratio').innerText = bP;
                document.getElementById('s-ratio').innerText = sP;
                document.getElementById('buy-bar').style.width = bP + "%";
                document.getElementById('sell-bar').style.width = sP + "%";

                const sig = document.getElementById('signal');
                if(sV > bV) {
                    sig.innerText = "SIGNAL: BEARISH ●"; sig.className = "signal-btn bearish";
                } else {
                    sig.innerText = "SIGNAL: BULLISH ●"; sig.className = "signal-btn bullish";
                }

                render(d.asks, 'sell-walls', '🎯', sV);
                render(d.bids, 'buy-walls', '🛡️', bV);
            } catch(e) {}
        }

        function render(arr, id, icon, sideTotal) {
            const container = document.getElementById(id);
            let top = arr.sort((a,b) => b[1]-a[1]).slice(0, 3);
            let html = '';
            top.forEach(o => {
                let cash = parseFloat(o[0]) * parseFloat(o[1]);
                let weight = ((cash/sideTotal) * 100).toFixed(2);
                html += `
                    <div class="wall-row">
                        <span class="icon-tag">${icon}</span>
                        <span style="font-family:monospace;">$${parseFloat(o[0]).toFixed(2)}</span>
                        <span class="perc-badge">${weight}%</span>
                        <span class="vol-text">Vol: ${ (cash/1000000).toFixed(2) }M</span>
                    </div>
                `;
            });
            container.innerHTML = html;
        }
    </script>
</body>
</html>
