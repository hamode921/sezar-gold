<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLD RADAR V1.5 | سيزار</title>
    <style>
        :root { --gold: #ffd700; --bg: #000; --neon: #00f2ff; --red: #ff4d4d; --green: #00ff88; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; padding: 10px; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .sezar-box { border: 2px solid var(--gold); background: #080808; width: 95%; max-width: 450px; padding: 20px; border-radius: 20px; text-align: center; box-shadow: 0 0 25px rgba(255,215,0,0.2); margin-bottom: 15px; }
        .price { font-size: 45px; color: var(--neon); font-weight: bold; margin: 10px 0; }
        .whale-box { background: #0a0a0a; width: 95%; max-width: 450px; border-radius: 15px; border: 1px solid #222; padding: 15px; box-sizing: border-box; }
        .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #111; font-size: 13px; }
        .pressure-bar { width: 100%; height: 10px; background: #222; border-radius: 5px; margin: 10px 0; overflow: hidden; display: flex; }
        #buy-bar { height: 100%; background: var(--green); transition: 0.5s; }
        #sell-bar { height: 100%; background: var(--red); transition: 0.5s; }
    </style>
</head>
<body onload="powerOn()">

    <div class="sezar-box">
        <h2 style="margin:0; font-size: 18px; color:var(--gold);">🔱 GOLD RADAR V1.5 🔱</h2>
        <div class="price" id="p">0.00</div>
        <div id="p-change" style="font-size: 12px; margin-bottom: 10px;">--</div>
        
        <div style="font-size: 10px; color: #666;">ميزان القوة (شراء vs بيع)</div>
        <div class="pressure-bar">
            <div id="buy-bar" style="width: 50%;"></div>
            <div id="sell-bar" style="width: 50%;"></div>
        </div>
    </div>

    <div class="whale-box">
        <div style="text-align: center; color: var(--gold); font-size: 12px; margin-bottom: 10px;">📡 رادار السيولة اللحظية</div>
        <div id="whale-output"></div>
    </div>

    <script>
        const priceWS = "wss://stream.binance.com:9443/ws/paxgusdt@ticker";
        const depthWS = "wss://stream.binance.com:9443/ws/paxgusdt@depth5"; // سحب أفضل 5 مستويات سيولة

        function powerOn() {
            connectPrice();
            connectWhales();
        }

        function connectPrice() {
            let ws = new WebSocket(priceWS);
            ws.onmessage = (e) => {
                const d = JSON.parse(e.data);
                document.getElementById('p').innerText = `$${parseFloat(d.c).toFixed(2)}`;
                const change = parseFloat(d.P).toFixed(2);
                const el = document.getElementById('p-change');
                el.innerText = (change >= 0 ? "▲ " : "▼ ") + change + "%";
                el.style.color = change >= 0 ? "var(--green)" : "var(--red)";
            };
        }

        function connectWhales() {
            let ws = new WebSocket(depthWS);
            ws.onmessage = (e) => {
                const d = JSON.parse(e.data);
                let buyVol = d.b.reduce((a, b) => a + parseFloat(b[1]), 0);
                let sellVol = d.a.reduce((a, b) => a + parseFloat(b[1]), 0);
                
                // تحديث ميزان القوة
                let total = buyVol + sellVol;
                document.getElementById('buy-bar').style.width = (buyVol/total * 100) + "%";
                document.getElementById('sell-bar').style.width = (sellVol/total * 100) + "%";

                // تحديث قائمة السيولة
                const out = document.getElementById('whale-output');
                out.innerHTML = "";
                d.b.slice(0, 3).forEach(b => {
                    out.innerHTML += `<div class="row"><span style="color:var(--green)">BUY</span><span>$${parseFloat(b[0]).toFixed(2)}</span><span style="color:var(--gold)">${parseFloat(b[1]).toFixed(2)} Oz</span></div>`;
                });
                d.a.slice(0, 3).forEach(a => {
                    out.innerHTML += `<div class="row"><span style="color:var(--red)">SELL</span><span>$${parseFloat(a[0]).toFixed(2)}</span><span style="color:var(--gold)">${parseFloat(a[1]).toFixed(2)} Oz</span></div>`;
                });
            };
        }
    </script>
</body>
</html>
