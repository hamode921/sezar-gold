<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLD TERMINAL V7.0 | الهاكرز</title>
    <style>
        /* أجبرنا المتصفح يكون أسود وما يضيف خلفية بيضاء */
        :root { --gold: #ffd700; --bg: #000; --red: #ff4d4d; --green: #00ff88; --neon: #00f2ff; }
        * { box-sizing: border-box; background-color: transparent !important; color-scheme: dark; }
        
        body { 
            background: #000 !important; 
            color: #fff !important; 
            font-family: 'Consolas', monospace; 
            padding: 10px; margin: 0; 
            display: flex; flex-direction: column; align-items: center; 
        }

        .main-container { width: 100%; max-width: 480px; background: #000 !important; }

        .price-val { font-size: 60px; color: var(--neon); font-weight: bold; text-align: center; margin: 10px 0; text-shadow: 0 0 10px rgba(0, 242, 255, 0.4); }

        .meter-container { background: #111; height: 6px; border-radius: 10px; overflow: hidden; display: flex; border: 1px solid #333; margin: 15px 0; }
        .meter-fill { height: 100%; transition: 1s ease-in-out; }

        .section-header { text-align: right; font-size: 16px; font-weight: bold; margin: 15px 0; display: flex; align-items: center; justify-content: flex-end; gap: 8px; border-bottom: 1px solid #111; padding-bottom: 5px; }

        .wall-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 10px; margin-bottom: 2px; }
        
        .perc-badge { color: var(--gold); font-weight: bold; font-size: 12px; margin-left: auto; margin-right: 15px; }
        .vol-text { color: var(--gold); font-weight: bold; font-family: monospace; font-size: 16px; text-align: left; }
        .wall-icon { font-size: 18px; }

        .signal-btn { width: 100%; padding: 25px; border-radius: 10px; text-align: center; font-weight: 900; font-size: 26px; margin-top: 25px; border: 2px solid #333; text-transform: uppercase; }
        .bearish { background: rgba(255, 77, 77, 0.1) !important; color: var(--red); border-color: var(--red); }
        .bullish { background: rgba(0, 255, 136, 0.1) !important; color: var(--green); border-color: var(--green); }
    </style>
</head>
<body onload="igniteRadar()">

    <div class="main-container">
        <div class="price-val" id="price">$0.00</div>

        <div class="meter-container">
            <div id="buy-bar" class="meter-fill" style="background: var(--green); width: 50%;"></div>
            <div id="sell-bar" class="meter-fill" style="background: var(--red); width: 50%;"></div>
        </div>

        <div class="section-header" style="color:var(--red)">SELL WALLS (30s)🔴</div>
        <div id="sell-walls"></div>

        <div class="section-header" style="color:var(--green)">BUY WALLS (30s)🟢</div>
        <div id="buy-walls"></div>

        <div id="master-signal" class="signal-btn bearish">ANALYZING...</div>
    </div>

    <script>
        async function igniteRadar() {
            setInterval(updateSystem, 1500);
        }

        function formatVal(v) {
            return v >= 1000000 ? (v/1000000).toFixed(2) + "M" : (v/1000).toFixed(0) + "K";
        }

        async function updateSystem() {
            try {
                const res = await fetch('https://api.binance.com/api/v3/depth?symbol=PAXGUSDT&limit=100');
                const d = await res.json();
                
                const p = parseFloat(d.bids[0][0]);
                document.getElementById('price').innerText = `$${p.toFixed(2)}`;

                let bV = d.bids.reduce((a, b) => a + (parseFloat(b[0])*parseFloat(b[1])), 0);
                let sV = d.asks.reduce((a, b) => a + (parseFloat(a[0])*parseFloat(a[1])), 0);
                
                let bPerc = (bV/(bV+sV) * 100).toFixed(1);
                let sPerc = (sV/(bV+sV) * 100).toFixed(1);

                document.getElementById('buy-bar').style.width = bPerc + "%";
                document.getElementById('sell-bar').style.width = sPerc + "%";

                const sig = document.getElementById('master-signal');
                if(bV > sV) {
                    sig.innerText = "SIGNAL: BULLISH ●"; sig.className = "signal-btn bullish";
                } else {
                    sig.innerText = "SIGNAL: BEARISH ●"; sig.className = "signal-btn bearish";
                }

                renderArea(d.asks.slice(0, 3), 'sell-walls', '🔴', sV);
                renderArea(d.bids.slice(0, 3), 'buy-walls', '🟢', bV);
                
            } catch(e) {}
        }

        function renderArea(arr, id, icon, sideTotal) {
            const container = document.getElementById(id);
            container.innerHTML = '';
            arr.sort((a,b) => b[1]-a[1]).forEach(o => {
                let cash = parseFloat(o[0]) * parseFloat(o[1]);
                let div = document.createElement('div');
                div.className = 'wall-row';
                div.innerHTML = `
                    <span class="wall-icon">${icon}</span>
                    <span style="font-family:monospace; margin-left: 10px;">$${parseFloat(o[0]).toFixed(2)}</span>
                    <span class="perc-badge">${((cash/sideTotal) * 100).toFixed(1)}%</span>
                    <span class="vol-text">Vol: $${formatVal(cash)}</span>
                `;
                container.appendChild(div);
            });
        }
    </script>
</body>
</html>
