<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLD TERMINAL V5.1 | جدران الحيتان</title>
    <style>
        :root { --gold: #ffd700; --bg: #030303; --red: #ff3333; --green: #00ff66; --neon: #00f2ff; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; padding: 10px; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .main-container { width: 100%; max-width: 480px; border-radius: 20px; padding: 10px; }
        .price-val { font-size: 55px; color: var(--neon); font-weight: 900; text-align: center; margin: 20px 0; text-shadow: 0 0 15px rgba(0, 242, 255, 0.3); }
        .wall-section { margin-top: 15px; }
        .wall-title { font-size: 13px; font-weight: bold; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .wall-row { display: flex; justify-content: space-between; padding: 12px 10px; background: #0a0a0a; border-radius: 10px; margin-bottom: 5px; border: 1px solid #111; align-items: center; }
        .vol-cash { color: var(--gold); font-weight: bold; font-family: monospace; font-size: 17px; }
        .price-tag { font-family: monospace; font-size: 15px; }
        .signal-bar { width: 100%; padding: 22px; border-radius: 12px; text-align: center; font-weight: 900; font-size: 22px; margin-top: 20px; border: 1px solid #333; letter-spacing: 2px; }
        .bearish { background: rgba(255, 51, 51, 0.15); color: var(--red); border-color: var(--red); }
        .bullish { background: rgba(0, 255, 102, 0.15); color: var(--green); border-color: var(--green); }
    </style>
</head>
<body onload="ignite()">

    <div class="main-container">
        <div class="price-val" id="price">$0.00</div>

        <div class="wall-section">
            <div class="wall-title" style="color: var(--red);">● SELL WALLS (CASH)</div>
            <div id="sell-walls"></div>
        </div>

        <div class="wall-section">
            <div class="wall-title" style="color: var(--green);">● BUY WALLS (CASH)</div>
            <div id="buy-walls"></div>
        </div>

        <div id="signal" class="signal-bar">INITIALIZING...</div>
    </div>

    <script>
        async function ignite() {
            update();
            setInterval(update, 2000);
        }

        function formatMoney(v) {
            if (v >= 1000000) return (v/1000000).toFixed(2) + "M";
            return (v/1000).toFixed(0) + "K";
        }

        async function update() {
            try {
                const res = await fetch('https://api.binance.com/api/v3/depth?symbol=PAXGUSDT&limit=100');
                const d = await res.json();
                
                const p = parseFloat(d.bids[0][0]);
                document.getElementById('price').innerText = `$${p.toFixed(2)}`;

                let bV = d.bids.reduce((a, b) => a + (parseFloat(b[0])*parseFloat(b[1])), 0);
                let sV = d.asks.reduce((a, b) => a + (parseFloat(a[0])*parseFloat(a[1])), 0);

                const sig = document.getElementById('signal');
                if(sV > bV) {
                    sig.innerText = "SIGNAL: BEARISH"; sig.className = "signal-bar bearish";
                } else {
                    sig.innerText = "SIGNAL: BULLISH"; sig.className = "signal-bar bullish";
                }

                render(d.asks, 'sell-walls', 'SELL', 'var(--red)');
                render(d.bids, 'buy-walls', 'BUY', 'var(--green)');
            } catch(e) {}
        }

        function render(arr, id, type, color) {
            const container = document.getElementById(id);
            // تصفية الأوامر اللي تستاهل العرض (أكبر من 10 آلاف دولار) وفرزها حسب الأثقل
            let top = arr.map(o => ({p: o[0], v: parseFloat(o[0])*parseFloat(o[1])}))
                         .filter(o => o.v > 10000)
                         .sort((a,b) => b.v - a.v)
                         .slice(0, 4);

            let html = '';
            top.forEach(o => {
                html += `
                    <div class="wall-row">
                        <span class="vol-cash">Vol: $${formatMoney(o.v)}</span>
                        <span class="price-tag">$${parseFloat(o.p).toFixed(2)}</span>
                        <span style="color:${color}; font-weight:bold;">${type}</span>
                    </div>
                `;
            });
            container.innerHTML = html || '<div style="text-align:center; color:#333;">بانتظار الحيتان...</div>';
        }
    </script>
</body>
</html>
