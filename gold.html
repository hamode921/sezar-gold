<!DOCTYPE html>
<html lang="en" dir="ltr" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>XAU/USD STABLE RADAR</title>
    <style>
        :root { --gold: #ffd700; --bg: #000; --red: #ff4d4d; --green: #00ff88; --neon: #00f2ff; }
        * { box-sizing: border-box; background-color: transparent !important; }
        body { background: #000 !important; color: #fff !important; font-family: sans-serif; padding: 15px; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 480px; }
        .price-box { text-align: center; border: 1px dashed #444; padding: 30px; border-radius: 5px; margin-bottom: 25px; }
        .price-val { font-size: 58px; color: var(--neon); font-weight: 900; }
        .meter-bar { height: 12px; background: #111; border-radius: 10px; overflow: hidden; display: flex; margin-bottom: 35px; border: 1px solid #333; }
        .wall-row { display: flex; align-items: center; padding: 18px 5px; border-bottom: 1px solid #111; width: 100%; }
        .price-tag { font-family: monospace; font-size: 20px; font-weight: bold; margin-right: auto; }
        .badge { background: #1a1500; color: var(--gold); border: 1px solid #443300; padding: 2px 12px; border-radius: 20px; font-size: 13px; font-weight: bold; margin: 0 15px; }
        .vol-tag { color: #fff; font-weight: bold; font-family: monospace; font-size: 18px; min-width: 90px; text-align: right; }
        .signal-btn { width: 100%; padding: 25px; border-radius: 12px; text-align: center; font-weight: 900; font-size: 26px; margin-top: 30px; border: 2px solid #333; transition: 0.8s; }
        .bearish { background: rgba(255, 77, 77, 0.1) !important; color: var(--red); border-color: var(--red); }
        .bullish { background: rgba(0, 255, 136, 0.1) !important; color: var(--green); border-color: var(--green); }
    </style>
</head>
<body class="notranslate" onload="start()">

    <div class="container notranslate">
        <div class="price-box">
            <div style="font-size: 12px; color: var(--gold); margin-bottom: 10px;">XAU/USD REAL-TIME LIQUIDITY</div>
            <div class="price-val" id="price">$0.00</div>
        </div>

        <div id="trend-text" style="text-align:center; font-weight:bold; margin-bottom:10px;">BUY 50% | SELL 50%</div>
        <div class="meter-bar">
            <div id="b-bar" style="width: 50%; background: var(--green); transition: 1.5s;"></div>
            <div id="s-bar" style="width: 50%; background: var(--red); transition: 1.5s;"></div>
        </div>

        <div style="color:var(--red); font-weight:bold; margin-bottom:10px; text-align:right;">:MAJOR RESISTANCE 🔴</div>
        <div id="sl"></div>

        <div style="color:var(--green); font-weight:bold; margin:20px 0 10px; text-align:right;">:MAJOR SUPPORT 🟢</div>
        <div id="bl"></div>

        <div id="sig" class="signal-btn">ANALYZING...</div>
    </div>

<script>
let sigBuffer = [];

async function start() {
    update();
    setInterval(update, 3000); // تحديث كل 3 ثواني للاستقرار
}

async function update() {
    try {
        const res = await fetch('https://api.binance.com/api/v3/depth?symbol=PAXGUSDT&limit=100');
        const d = await res.json();
        const p = parseFloat(d.bids[0][0]);
        document.getElementById('price').innerText = '$' + p.toFixed(2);

        // تجميع السيولة بفرق 3-5 دولار لعرض دعوم حقيقية
        let bV = 0, sV = 0;
        let buyMap = {}, sellMap = {};

        d.bids.forEach(b => {
            let price = Math.floor(parseFloat(b[0]) / 2) * 2; // تجميع كل 2 دولار
            let cash = parseFloat(b[0]) * parseFloat(b[1]);
            buyMap[price] = (buyMap[price] || 0) + cash;
            bV += cash;
        });

        d.asks.forEach(a => {
            let price = Math.ceil(parseFloat(a[0]) / 2) * 2;
            let cash = parseFloat(a[0]) * parseFloat(a[1]);
            sellMap[price] = (sellMap[price] || 0) + cash;
            sV += cash;
        });

        let bP = (bV/(bV+sV)*100).toFixed(1);
        let sP = (100 - bP).toFixed(1);

        document.getElementById('trend-text').innerText = `BUY ${bP}% | SELL ${sP}%`;
        document.getElementById('b-bar').style.width = bP + '%';
        document.getElementById('s-bar').style.width = sP + '%';

        // فلتر استقرار الإشارة
        let currentStatus = bV > sV ? 1 : -1;
        sigBuffer.push(currentStatus);
        if(sigBuffer.length > 5) sigBuffer.shift();
        let avg = sigBuffer.reduce((a,b) => a+b, 0);

        const sig = document.getElementById('sig');
        if (avg >= 4) {
            sig.innerText = "SIGNAL: STRONG BUY 🚀"; sig.className = "signal-btn bullish";
        } else if (avg <= -4) {
            sig.innerText = "SIGNAL: STRONG SELL 🔻"; sig.className = "signal-btn bearish";
        } else {
            sig.innerText = "SIGNAL: STABILIZING... ⏳"; sig.className = "signal-btn";
        }

        render(sellMap, 'sl', '🎯', sV);
        render(buyMap, 'bl', '🛡️', bV);

    } catch(e) {}
}

function render(map, id, icon, total) {
    const container = document.getElementById(id);
    let top = Object.keys(map).map(p => ({p: p, v: map[p]}))
                .sort((a,b) => b.v - a.v).slice(0, 3);
    let html = '';
    top.forEach(o => {
        let weight = (o.v/total*100).toFixed(2);
        html += `<div class="wall-row">
            <span style="font-size:22px;">${icon}</span>
            <span class="price-tag">$${o.p}.00</span>
            <span class="badge">${weight}%</span>
            <span class="vol-tag">Vol: ${(o.v/100000).toFixed(2)}M</span>
        </div>`;
    });
    container.innerHTML = html;
}
</script>
</body>
</html>
